name = "ga-swipe-translate"
main = "src/index.js"
compatibility_date = "2024-09-23"

# GitHub Pages のオリジンに合わせて書き換える（例: https://<ユーザー名>.github.io）
[vars]
ALLOWED_ORIGIN = "https://<your-username>.github.io"

# 事前に `wrangler kv namespace create TRANSLATE_CACHE` 等で作成し、
# 出力された id をここに貼り付ける（README参照）
kv_namespaces = [
  { binding = "TRANSLATE_CACHE", id = "<TRANSLATE_CACHE の namespace id>" },
  { binding = "RATE_LIMIT_KV", id = "<RATE_LIMIT_KV の namespace id>" },
]

# DEEPL_API_KEY は secret のためここには書かない。
# `wrangler secret put DEEPL_API_KEY` で登録する。
