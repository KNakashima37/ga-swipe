name = "ga-swipe-translate"
main = "src/index.js"
compatibility_date = "2024-09-23"

# GitHub Pages のオリジンに合わせて書き換える（例: https://<ユーザー名>.github.io）
[vars]
ALLOWED_ORIGIN = "https://<your-username>.github.io"

kv_namespaces = [
  { binding = "TRANSLATE_CACHE", id = "492b55f67ddd4c239bf54921e2dd0b7d" },
  { binding = "RATE_LIMIT_KV", id = "66afbea0b0a9430b85a21bd11cf6ce1a" },
]

# DEEPL_API_KEY は secret のためここには書かない。
# `wrangler secret put DEEPL_API_KEY` で登録する。
